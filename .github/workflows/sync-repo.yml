name: Batch Sync with Auto Create Repo

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  batch-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git and Install Dependencies
        run: |
          # 配置Git
          git config --global user.name "jhonpj"
          git config --global user.email "pengjingmine@163.com"
          git config --global init.defaultBranch main
          # 优化Git传输
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          # 安装依赖
          sudo apt-get update && sudo apt-get install -y jq

      - name: Batch Sync Repos
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_USER: "jhonpj"
        run: |
          set -euo pipefail
          
          # ========== 配置同步列表 ==========
          SYNC_LIST=(
            "openclaw/openclaw my-openclaw"
            "chaitin/PandaWiki PandaWiki" 
            "chaitin/MonkeyCode MonkeyCode" 
          )

          for ITEM in "${SYNC_LIST[@]}"; do
            IFS=' ' read -r -a PARTS <<< "$ITEM"
            SOURCE_REPO_FULL="${PARTS[0]}"
            TARGET_REPO_NAME="${PARTS[1]}"
            TARGET_REPO_URL="https://$SYNC_TOKEN@github.com/$GITHUB_USER/$TARGET_REPO_NAME.git"
            
            echo "===== 开始处理：$TARGET_REPO_NAME ====="
            echo "源仓库：$SOURCE_REPO_FULL"

            # 1. 检查目标仓库是否存在，不存在则创建
            echo "检查目标仓库状态..."
            CHECK_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $SYNC_TOKEN" \
              "https://api.github.com/repos/$GITHUB_USER/$TARGET_REPO_NAME")

            if [ "$CHECK_RESP" = "404" ]; then
              echo "目标仓库不存在，开始创建..."
              CREATE_RESP=$(curl -s -X POST \
                -H "Authorization: token $SYNC_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                -H "Content-Type: application/json" \
                https://api.github.com/user/repos \
                -d "{\"name\":\"$TARGET_REPO_NAME\",\"private\":false,\"auto_init\":true,\"description\":\"Sync from https://github.com/$SOURCE_REPO_FULL\"}")
              
              if echo "$CREATE_RESP" | jq -e '.id' > /dev/null 2>&1; then
                echo "✅ 仓库创建成功，等待10秒..."
                sleep 10
              else
                echo "❌ 仓库创建失败：$CREATE_RESP"
                continue
              fi
            elif [ "$CHECK_RESP" != "200" ]; then
              echo "⚠️ 检查仓库失败，HTTP码：$CHECK_RESP"
              continue
            fi

            # 2. 获取源仓库默认分支
            echo "获取源仓库默认分支..."
            SOURCE_DEFAULT_BRANCH=$(curl -s \
              -H "Authorization: token $SYNC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$SOURCE_REPO_FULL" | jq -r '.default_branch')
            
            if [ "$SOURCE_DEFAULT_BRANCH" = "null" ] || [ -z "$SOURCE_DEFAULT_BRANCH" ]; then
              SOURCE_DEFAULT_BRANCH="main"
            fi
            echo "✅ 源仓库默认分支：$SOURCE_DEFAULT_BRANCH"

            # 3. 终极方案：只同步文件内容（抛弃原有提交历史）
            echo "开始同步纯文件内容（绕开LFS）..."
            TEMP_DIR=$(mktemp -d)
            SOURCE_ARCHIVE_URL="https://github.com/$SOURCE_REPO_FULL/archive/refs/heads/$SOURCE_DEFAULT_BRANCH.tar.gz"
            
            # ========== 核心：下载源仓库纯文件压缩包（无提交历史） ==========
            echo "下载源仓库文件包：$SOURCE_ARCHIVE_URL"
            curl -sL "$SOURCE_ARCHIVE_URL" -o "$TEMP_DIR/source.tar.gz"
            
            # 解压文件
            mkdir -p "$TEMP_DIR/source_files"
            tar -zxf "$TEMP_DIR/source.tar.gz" -C "$TEMP_DIR/source_files" --strip-components=1
            
            # 初始化目标仓库本地版本
            cd "$TEMP_DIR"
            mkdir -p target_repo
            cd target_repo
            git init
            git remote add origin "$TARGET_REPO_URL"
            
            # 把源文件复制到目标仓库目录（覆盖原有内容）
            cp -rf "$TEMP_DIR/source_files/"* .
            
            # 可选：删除可能的LFS配置文件（彻底清理）
            rm -f .gitattributes .lfsconfig
            
            # 重新提交所有文件（生成全新提交，无LFS引用）
            git add .
            git commit -m "Sync files from $SOURCE_REPO_FULL ($SOURCE_DEFAULT_BRANCH) [skip LFS]" || true
            
            # 强制推送到目标仓库
            echo "推送到目标仓库..."
            git push origin main -f --no-verify
            
            # 清理
            cd ../..
            rm -rf "$TEMP_DIR"
            
            echo "✅ $TARGET_REPO_NAME 同步完成（纯文件内容，无LFS引用）！"
            echo "----------------------------------------"
          done

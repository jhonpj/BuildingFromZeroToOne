name: Batch Sync with Auto Create Repo

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  batch-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git and Env
        run: |
          git config --global user.name "jhonpj"
          git config --global user.email "pengjingmine@163.com"
          echo "GITHUB_USER=jhonpj" >> $GITHUB_ENV
          # 配置Git大文件传输参数（关键修复）
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global core.compression 0

      - name: Batch Sync Repos (Auto Create if Not Exist)
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_USER: ${{ env.GITHUB_USER }}
        run: |
          set -euo pipefail
          
          SYNC_LIST=(
            "https://github.com/openclaw/openclaw.git my-openclaw"
            # 可继续添加仓库
          )

          for ITEM in "${SYNC_LIST[@]}"; do
            IFS=' ' read -r -a PARTS <<< "$ITEM"
            SOURCE_REPO="${PARTS[0]}"
            TARGET_REPO_NAME="${PARTS[1]}"
            TARGET_REPO_URL="https://github.com/$GITHUB_USER/$TARGET_REPO_NAME.git"
            AUTH_TARGET_URL="https://$SYNC_TOKEN@github.com/$GITHUB_USER/$TARGET_REPO_NAME.git"
            echo "===== 开始处理：$TARGET_REPO_NAME ====="

            # 1. 检查并创建仓库（保留原有逻辑）
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $SYNC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$GITHUB_USER/$TARGET_REPO_NAME")

            if [ "$RESPONSE" = "404" ]; then
              echo "创建仓库 $TARGET_REPO_NAME..."
              CREATE_JSON=$(jq -n \
                --arg name "$TARGET_REPO_NAME" \
                '{
                  "name": $name,
                  "private": false,
                  "auto_init": true,
                  "description": "Sync from '${SOURCE_REPO}'"
                }')
              
              CREATE_RESP=$(curl -s -X POST \
                -H "Authorization: token $SYNC_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                -H "Content-Type: application/json" \
                https://api.github.com/user/repos \
                -d "$CREATE_JSON")
              
              if echo "$CREATE_RESP" | jq -e '.id' > /dev/null 2>&1; then
                echo "✅ 仓库创建成功，等待10秒同步..."
                sleep 10  # 延长等待时间
              else
                echo "❌ 仓库创建失败：$CREATE_RESP"
                continue
              fi
            elif [ "$RESPONSE" = "200" ]; then
              echo "ℹ️ 仓库已存在"
            else
              echo "⚠️ 检查仓库失败，HTTP码：$RESPONSE"
              continue
            fi

            # 2. 克隆目标仓库（关闭浅克隆，拉取完整历史）
            echo "克隆目标仓库..."
            TEMP_DIR=$(mktemp -d)
            # 删除原有仓库（如果存在），避免冲突
            rm -rf $TEMP_DIR
            git clone --no-shallow $AUTH_TARGET_URL $TEMP_DIR || {
              # 克隆失败则重新初始化仓库
              echo "克隆失败，重新初始化仓库..."
              mkdir -p $TEMP_DIR
              cd $TEMP_DIR
              git init
              git remote add origin $AUTH_TARGET_URL
              cd ..
            }
            cd $TEMP_DIR

            # 3. 修复分支识别逻辑（关键！）
            echo "检测源仓库主分支..."
            # 方法1：先尝试获取源仓库默认分支（最准确）
            DEFAULT_BRANCH=$(curl -s \
              -H "Authorization: token $SYNC_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$SOURCE_REPO" | jq -r '.default_branch // "main"')
            
            # 方法2：备用方案（只取main/master）
            if [ "$DEFAULT_BRANCH" != "main" ] && [ "$DEFAULT_BRANCH" != "master" ]; then
              echo "默认分支非main/master，尝试检测main/master..."
              DEFAULT_BRANCH=$(git ls-remote --heads $SOURCE_REPO | grep -E 'refs/heads/main|refs/heads/master' | awk '{print $2}' | sed 's/refs\/heads\///' | head -1 || echo "main")
            fi
            
            echo "✅ 最终选择分支：$DEFAULT_BRANCH"

            # 4. 同步源仓库代码（完整拉取，避免提交缺失）
            git remote add source $SOURCE_REPO
            # 完整拉取指定分支，不浅克隆
            git fetch source $DEFAULT_BRANCH --tags --no-tags --depth=0
            # 强制重置到源仓库分支
            git checkout -B main source/$DEFAULT_BRANCH
            git reset --hard source/$DEFAULT_BRANCH

            # 5. 推送代码（优化推送策略）
            echo "推送代码到目标仓库..."
            # 先推送分支，再推送标签（分开推送降低压力）
            git push origin main -f --no-thin || {
              echo "首次推送失败，重试推送..."
              git push origin main -f --no-thin  # 重试一次
            }

            # 6. 清理
            cd ..
            rm -rf $TEMP_DIR
            echo "✅ $TARGET_REPO_NAME 同步完成！"
            echo "----------------------------------------"
          done
